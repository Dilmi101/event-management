syntax = "proto3";

option java_multiple_files = true;
option java_package = "net.dilmi.program_service.grpc";
option java_outer_classname = "ProgramServiceProto";

package program_service;

import "google/protobuf/timestamp.proto";

message Track {
  string track_id = 1;
  string event_id = 2;
  string name = 3;
  google.protobuf.Timestamp created_at = 4;
}

message GetTrackRequest {
  string track_id = 1;
}

message ListTracksRequest {}

message ListTracksResponse {
  repeated Track tracks = 1;
}

message CreateTrackRequest {
  string event_id = 1;
  string name = 2;
}

message UpdateTrackRequest {
  string track_id = 1;
  string event_id = 2;
  string name = 3;
}

message DeleteTrackRequest {
  string track_id = 1;
}

message DeleteTrackResponse {
  bool success = 1;
}

message Session {
  string session_id = 1;
  string track_id = 2;
  string event_id = 3;
  int32 day = 4;
  string session_title = 5;
  string speaker_name = 6;
  string start_time = 7;
  string end_time = 8;
  google.protobuf.Timestamp created_at = 9;
}

message GetSessionRequest {
  string session_id = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message CreateSessionRequest {
  string track_id = 1;
  string event_id = 2;
  int32 day = 3;
  string session_title = 4;
  string speaker_name = 5;
  string start_time = 6;
  string end_time = 7;
}

message UpdateSessionRequest {
  string session_id = 1;
  string track_id = 2;
  string event_id = 3;
  int32 day = 4;
  string session_title = 5;
  string speaker_name = 6;
  string start_time = 7;
  string end_time = 8;
}

message DeleteSessionRequest {
  string session_id = 1;
}

message DeleteSessionResponse {
  bool success = 1;
}

service TrackService {
  rpc GetTrack(GetTrackRequest) returns (Track);
  rpc ListTracks(ListTracksRequest) returns (ListTracksResponse);
  rpc CreateTrack(CreateTrackRequest) returns (Track);
  rpc UpdateTrack(UpdateTrackRequest) returns (Track);
  rpc DeleteTrack(DeleteTrackRequest) returns (DeleteTrackResponse);
}

service SessionService {
  rpc GetSession(GetSessionRequest) returns (Session);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc UpdateSession(UpdateSessionRequest) returns (Session);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
}
