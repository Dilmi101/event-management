databaseChangeLog:
  - changeSet:
      id: 001-create-tracks-table
      author: dilmi
      changes:
        - createTable:
            tableName: tracks
            columns:
              - column:
                  name: track_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
