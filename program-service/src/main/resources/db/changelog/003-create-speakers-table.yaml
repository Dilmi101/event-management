databaseChangeLog:
  - changeSet:
      id: 003-create-speakers-table
      author: dilmi
      changes:
        - createTable:
            tableName: speakers
            columns:
              - column:
                  name: speaker_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(255)
              - column:
                  name: bio
                  type: text
              - column:
                  name: photo_url
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
