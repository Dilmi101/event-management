databaseChangeLog:
  - changeSet:
      id: 001-create-events-table
      author: dilmi
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: event_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: venue
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: event_time
                  type: time
                  constraints:
                    nullable: false
              - column:
                  name: ticket_price
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: capacity
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: seats_available
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
        - sql:
            sql: ALTER TABLE events ADD CONSTRAINT chk_seats CHECK (seats_available >= 0)
        - sql:
            sql: ALTER TABLE events ADD CONSTRAINT chk_capacity CHECK (capacity > 0)
        - sql:
            sql: ALTER TABLE events ADD CONSTRAINT chk_seats_capacity CHECK (seats_available <= capacity)
