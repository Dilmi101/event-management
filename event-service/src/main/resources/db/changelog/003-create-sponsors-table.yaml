databaseChangeLog:
  - changeSet:
      id: 003-create-sponsors-table
      author: dilmi
      changes:
        - createTable:
            tableName: sponsors
            columns:
              - column:
                  name: sponsor_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: logo_url
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
