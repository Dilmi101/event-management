name: Release to ECR

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: ap-south-1
  ECR_REPO: cwk/event-management

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  build-proto-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build proto-common artifacts
        working-directory: ./proto-common
        run: ./gradlew publish --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: proto-repo
          path: ./proto-common/build/repo

  release:
    needs: build-proto-common
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: event-service
            context: ./event-service
            dockerfile: ./event-service/Dockerfile
          - name: program-service
            context: ./program-service
            dockerfile: ./program-service/Dockerfile
          - name: registration-service
            context: ./registration-service
            dockerfile: ./registration-service/Dockerfile
          - name: analytics-service
            context: ./analytics-service
            dockerfile: ./analytics-service/Dockerfile
          - name: event-view-fe
            context: ./event-view-fe
            dockerfile: ./event-view-fe/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        if: ${{ matrix.service.name != 'event-view-fe' && matrix.service.name != 'analytics-service' }}
        with:
          name: proto-repo
          path: ${{ matrix.service.context }}/proto-repo

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${{ matrix.service.name }}-$VERSION"
          LATEST_TAG="${{ matrix.service.name }}-latest"
          BUILD_ARGS=()
          if [ "${{ matrix.service.name }}" = "event-view-fe" ]; then
            # Empty strings so the browser uses relative paths and the ALB routes /api/* by prefix
            BUILD_ARGS=(
              --build-arg VITE_EVENT_SERVICE_URL=
              --build-arg VITE_PROGRAM_SERVICE_URL=
              --build-arg VITE_REGISTRATION_SERVICE_URL=
              --build-arg VITE_ANALYTICS_SERVICE_URL=
            )
          fi
          docker build \
            "${BUILD_ARGS[@]}" \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPO:$LATEST_TAG \
            -f ${{ matrix.service.dockerfile }} \
            ${{ matrix.service.context }}
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:$LATEST_TAG

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name event-management --region ${{ env.AWS_REGION }}

      - name: Apply application manifests
        # k8s/secrets/ (ExternalSecret/ClusterSecretStore CRs) is intentionally
        # excluded here and applied manually once during cluster bootstrap
        # (EKS-PROVISIONING.md Step 9) — the CI role doesn't have (and doesn't
        # need) RBAC on external-secrets.io resources.
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/clickhouse/
          kubectl apply -f k8s/metabase/
          kubectl apply -f k8s/event-service/
          kubectl apply -f k8s/program-service/
          kubectl apply -f k8s/registration-service/
          kubectl apply -f k8s/analytics-service/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml

      - name: Roll out new images
        run: |
          kubectl rollout restart \
            deployment/event-service \
            deployment/program-service \
            deployment/registration-service \
            deployment/analytics-service \
            deployment/frontend \
            -n event-management

      - name: Wait for rollouts to complete
        run: |
          for d in event-service program-service registration-service analytics-service frontend; do
            kubectl rollout status deployment/$d -n event-management --timeout=180s
          done

      - name: Deploy observability stack
        run: |
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic grafana-admin-credentials \
            -n observability \
            --from-literal=admin-user=admin \
            --from-literal=admin-password="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace observability \
            -f k8s/observability/kube-prometheus-stack-values.yaml \
            --wait --timeout 5m

          kubectl apply -f k8s/observability/servicemonitors.yaml
