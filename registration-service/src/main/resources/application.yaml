spring:
  application:
    name: registration-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/registrationdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9093}
    client:
      channel:
        event-service:
          target: ${EVENT_SERVICE_GRPC_ADDRESS:static://localhost:9091}
          ssl:
            enabled: false

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
