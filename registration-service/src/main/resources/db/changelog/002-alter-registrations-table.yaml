databaseChangeLog:
  - changeSet:
      id: 002-alter-registrations-table
      author: dilmi
      changes:
        - dropColumn:
            tableName: registrations
            columnName: name
        - addColumn:
            tableName: registrations
            columns:
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(50)
