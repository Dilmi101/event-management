apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: event-management
spec:
  # Initial/baseline replica count only — actual scaling (1-3) is governed
  # by the HorizontalPodAutoscaler in hpa.yaml. Do not hand-edit this to
  # "fix" a scaled-up count; the HPA owns spec.replicas after first apply.
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      serviceAccountName: event-service
      containers:
        - name: event-service
          image: 959740417723.dkr.ecr.ap-south-1.amazonaws.com/cwk/event-management:event-service-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
            - name: grpc
              containerPort: 9091
          env:
            - name: LOW_SEATS_THRESHOLD
              value: "10"
            - name: LAMBDA_FUNCTION_NAME
              value: event-low-seats-notifier
            - name: AWS_REGION
              value: ap-south-1
          envFrom:
            - secretRef:
                name: event-service-db
          resources:
            requests:
              cpu: 100m
              memory: 320Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
