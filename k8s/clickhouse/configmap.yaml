apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-scripts
  namespace: event-management
data:
  # Keep in sync with docker/clickhouse-init/001-create-web-events.sql
  001-create-web-events.sql: |
    CREATE TABLE IF NOT EXISTS analytics.web_events
    (
        timestamp   DateTime DEFAULT now(),
        event_type  String,
        page        String,
        session_id  String,
        browser     String
    )
    ENGINE = MergeTree()
    ORDER BY (timestamp);
