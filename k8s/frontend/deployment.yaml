apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: event-management
spec:
  # Initial/baseline replica count only — actual scaling (1-3) is governed
  # by the HorizontalPodAutoscaler in hpa.yaml. Do not hand-edit this to
  # "fix" a scaled-up count; the HPA owns spec.replicas after first apply.
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 959740417723.dkr.ecr.ap-south-1.amazonaws.com/cwk/event-management:event-view-fe-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
