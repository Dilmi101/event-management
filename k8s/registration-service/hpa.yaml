apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: registration-service
  namespace: event-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: registration-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
