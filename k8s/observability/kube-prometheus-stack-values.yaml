# Trimmed for a 2x t3.medium node group (4 vCPU / 8GB total across the
# whole cluster, shared with the app workloads) — the chart's defaults
# assume a much larger cluster.

prometheus:
  prometheusSpec:
    # Pick up ServiceMonitors from any namespace, not just ones the chart
    # itself labels — our app ServiceMonitors live in event-management.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 3d
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        memory: 768Mi
    # No working PVC provisioner on this cluster (no EBS CSI driver addon
    # installed, and the in-tree kubernetes.io/aws-ebs provisioner it falls
    # back to has no controller to service claims). Coursework-scale demo
    # doesn't need metrics to survive a pod restart, so run on emptyDir
    # instead of chasing PVC binding. Omitting storageSpec makes the
    # Prometheus Operator use emptyDir by default.

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

grafana:
  # Do not ship the chart's default admin/prom-operator credentials.
  # Create the secret first:
  #   kubectl create secret generic grafana-admin-credentials \
  #     -n observability \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password='<STRONG_PASSWORD>'
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      # Observed steady-state usage is ~400Mi (Grafana's newer unified
      # storage/search indexing is not lightweight) — 256Mi was too tight
      # and risked an OOM kill under any load spike.
      memory: 512Mi
  # No public ingress — access via port-forward for the viva demo
  # (see EKS-PROVISIONING.md, Step 7c).
  service:
    type: ClusterIP
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

# Skip etcd/scheduler/controller-manager scraping — not reachable on EKS,
# the control plane is AWS-managed and these targets would just show "down".
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
