apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: event-service
  namespace: event-management
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: event-service
  namespaceSelector:
    matchNames:
      - event-management
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
---
