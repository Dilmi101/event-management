apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clickhouse-credentials
  namespace: event-management
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: clickhouse-credentials
    creationPolicy: Owner
  data:
    - secretKey: CLICKHOUSE_DB
      remoteRef:
        key: /event-management/clickhouse/db
    - secretKey: CLICKHOUSE_USER
      remoteRef:
        key: /event-management/clickhouse/username
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: /event-management/clickhouse/password
