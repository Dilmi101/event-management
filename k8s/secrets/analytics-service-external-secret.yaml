apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: analytics-service-db
  namespace: event-management
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: analytics-service-db
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: /event-management/analytics-service/db-url
    - secretKey: DB_USERNAME
      remoteRef:
        key: /event-management/analytics-service/db-username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /event-management/analytics-service/db-password
