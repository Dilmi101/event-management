apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: event-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.62.1.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MB_DB_TYPE
              value: postgres
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx1600m"
          envFrom:
            - secretRef:
                name: metabase-db
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /readyz
              port: 3000
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            periodSeconds: 10
