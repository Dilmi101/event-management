services:
  postgres:
    image: docker.io/library/postgres:18.4
    container_name: event-management-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/18/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  event-service:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "9091:9091"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/eventdb
      DB_USERNAME: ${EVENT_DB_USER}
      DB_PASSWORD: ${EVENT_DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
  program-service:
    build:
      context: ./program-service
      dockerfile: Dockerfile
    container_name: program-service
    restart: unless-stopped
    ports:
      - "8082:8082"
      - "9092:9092"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/programsdb
      DB_USERNAME: ${PROGRAMS_DB_USER}
      DB_PASSWORD: ${PROGRAMS_DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  registration-service:
    build:
      context: ./registration-service
      dockerfile: Dockerfile
    container_name: registration-service
    restart: unless-stopped
    ports:
      - "8083:8083"
      - "9093:9093"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/registrationdb
      DB_USERNAME: ${REGISTRATION_DB_USER}
      DB_PASSWORD: ${REGISTRATION_DB_PASSWORD}
      EVENT_SERVICE_GRPC_ADDRESS: static://event-service:9091
    depends_on:
      postgres:
        condition: service_healthy
      event-service:
        condition: service_started

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:clickhouse://clickhouse:8123/analytics
      DB_USERNAME: ${CLICKHOUSE_USER}
      DB_PASSWORD: ${CLICKHOUSE_PASSWORD}
    depends_on:
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: ./event-view-fe
      dockerfile: Dockerfile
      args:
        VITE_EVENT_SERVICE_URL: ""
        VITE_PROGRAM_SERVICE_URL: ""
        VITE_REGISTRATION_SERVICE_URL: ""
        VITE_ANALYTICS_SERVICE_URL: ""
    container_name: event-view-fe
    restart: unless-stopped
    ports:
      - "8084:80"
    depends_on:
      - event-service
      - program-service
      - registration-service
      - analytics-service

volumes:
  postgres_data:
  clickhouse_data:
